name: CI

# WHEN does this run?
# - On every pull request targeting dev or master
# - Manually from the GitHub Actions tab (workflow_dispatch)
# This acts as a quality gate: if CI fails, the PR cannot be safely merged.
on:
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Lint, Test, Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"   # Caches pip downloads between runs — faster CI

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Linting catches style issues before they reach the codebase.
      # Configured in setup.cfg / .flake8 — max 88 chars.
      - name: Lint
        run: flake8 .

      # Tests run against an in-memory SQLite DB (see tests/conftest.py).
      # Use python -m pytest so it uses the same Python that installed packages.
      - name: Run tests
        run: python -m pytest

      # Freeze verifies every route renders without errors.
      # freeze.py calls db.create_all() so it works with a fresh empty DB.
      - name: Build static site
        run: |
          set -euo pipefail
          python freeze.py
