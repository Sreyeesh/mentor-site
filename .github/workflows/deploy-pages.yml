name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL }}
      BASE_PATH: ${{ vars.BASE_PATH }}
      GITHUB_PAGES_BASE_PATH: ${{ vars.BASE_PATH }}
      SITE_COMING_SOON: ${{ vars.SITE_COMING_SOON }}
      SITE_GITHUB_URL: ${{ vars.SITE_GITHUB_URL }}
      SITE_LINKEDIN_URL: ${{ vars.SITE_LINKEDIN_URL }}
      SITE_IMDB_URL: ${{ vars.SITE_IMDB_URL }}
      ASSET_VERSION: ${{ vars.ASSET_VERSION }}
      SITE_SOCIAL_IMAGE: ${{ vars.SITE_SOCIAL_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: the construction dashboard bakes real commit
          # counts into the page; a shallow clone would report 1 commit.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate static site
        run: |
          set -euo pipefail
          python freeze.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
