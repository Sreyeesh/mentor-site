services:
  toucan-ee:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-/}
    container_name: toucan-ee-prod
    ports:
      # Map configurable host port to container port 80 (nginx)
      - "${TOUCAN_PORT:-3000}:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  authoring-tool:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BASE_PATH: ${BASE_PATH:-/}
    container_name: toucan-ee-authoring
    command: python author_app.py
    ports:
      - "5001:5000"
    volumes:
      - ./static:/app/static
      - ./data:/app/data
    environment:
      - AUTHORING_SECRET_KEY=authoring-dev-secret
      - DATABASE_URL=sqlite:////app/data/blog.db
      - BASE_PATH=${BASE_PATH:-/}
    restart: unless-stopped
    profiles:
      - authoring

  # Alternative service for development
  toucan-ee-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BASE_PATH: ${BASE_PATH:-/}
    container_name: toucan-ee-dev
    ports:
      - "5000:5000"  # Map host 5000 to Flask dev server
    command: python app.py
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - BASE_PATH=${BASE_PATH:-/}
      - DATABASE_URL=sqlite:////app/data/blog.db
    volumes:
      - ./:/app
    env_file:
      - .env.dev
    profiles:
      - dev  # Only start with --profile dev
    restart: "no"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git
            - __pycache__
            - node_modules
        - action: rebuild
          path: .env.dev

  tests:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BASE_PATH: ${BASE_PATH:-/}
    command: pytest
    volumes:
      - ./:/app
    profiles:
      - ci
    working_dir: /app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    restart: "no"

networks:
  default:
    name: toucan-ee-network
