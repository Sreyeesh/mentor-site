services:
  mentor-site:
    build:
      context: .
    container_name: mentor-site-prod
    ports:
      - "${PORT:-3000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mentor-site-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mentor-site-dev
    ports:
      - "5000:5000"
    command: python app.py
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - APP_ENV=development
    volumes:
      - ./:/app
    env_file:
      - .env.dev
    profiles:
      - dev
    restart: "no"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git
            - __pycache__
            - node_modules
        - action: rebuild
          path: .env.dev

  tests:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pytest
    volumes:
      - ./:/app
    profiles:
      - ci
    working_dir: /app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    restart: "no"

networks:
  default:
    name: mentor-site-network
