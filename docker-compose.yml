services:
  toucan-ee:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-/}
    container_name: toucan-ee-prod
    ports:
      - "${TOUCAN_PORT:-3000}:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  toucan-ee-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BASE_PATH: ${BASE_PATH:-/}
    container_name: toucan-ee-dev
    ports:
      - "5000:5000"
    command: python app.py
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - BASE_PATH=${BASE_PATH:-/}
    volumes:
      - ./:/app
    env_file:
      - .env.dev
    profiles:
      - dev
    restart: "no"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git
            - __pycache__
            - node_modules
        - action: rebuild
          path: .env.dev

  tests:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BASE_PATH: ${BASE_PATH:-/}
    command: pytest
    volumes:
      - ./:/app
    profiles:
      - ci
    working_dir: /app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    restart: "no"

networks:
  default:
    name: toucan-ee-network
